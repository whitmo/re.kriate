name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install busted and luacov
        run: luarocks install busted && luarocks install luacov

      - name: Lint - syntax check all Lua files
        run: find . -type f -name '*.lua' -not -path './.git/*' -not -path './.specify/*' -print0 | xargs -0 -n1 luac -p

      - name: Run tests with coverage
        run: |
          busted --coverage specs/
          luacov
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          sed -n '/^Summary$/,$p' luacov.report.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        run: |
          TOTAL=$(grep '^Total' luacov.report.out | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc -l)" -eq 1 ]; then
            echo "FAIL: Coverage ${TOTAL}% is below 80% threshold"
            exit 1
          fi
