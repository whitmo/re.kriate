# Ralph Orchestrator Configuration — re.kriate
# TDD-driven speckit pipeline. Claude drives ralph autonomously.
#
# Flow: work.start → specify → plan → tasks → analyze → implement → verify → (loop or LOOP_COMPLETE)
# TDD is non-negotiable (constitution principle III).
#
# Multiclaude is available for parallel work on [P]-marked tasks.
# Start with: ralph loops  (or /mc swarm from within a hat)
# Each parallel loop gets its own worktree and merges back on completion.

cli:
  backend: "claude"

event_loop:
  prompt_file: "PROMPT.md"
  starting_event: "work.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 200

hats:
  specifier:
    name: "Specifier"
    description: "Creates feature specs from rough ideas using speckit pipeline"
    triggers: ["work.start", "feature.complete", "analysis.fix.spec"]
    publishes: ["spec.ready"]
    instructions: |
      You drive the specification phase of re.kriate feature development.

      ## On work.start

      1. Check .ralph/agent/feature-queue.md for the next unstarted feature
         - Features are listed as `- [ ] <description>` (pending) or `- [x] <description>` (done)
         - If no queue file exists or all features are done, output: LOOP_COMPLETE
      2. Mark the feature as in-progress: `- [~] <description>`
      3. Run `/speckit.specify <feature description>` to create the spec
      4. For any [NEEDS CLARIFICATION] items: make informed decisions based on
         kria reference behavior, norns conventions, and musical common sense.
         Do NOT block waiting for human input.
      5. Emit `spec.ready` with the feature branch name and spec file path

      ## On analysis.fix.spec

      Read the analyzer's findings. Update the spec to resolve CRITICAL issues.
      Re-validate the spec checklist. Emit `spec.ready` when fixed.

      ## Principles
      - Specs should be small and focused — one user-facing behavior at a time
      - Use kria reference implementations to inform defaults
      - Document assumptions explicitly

  planner:
    name: "Planner"
    description: "Creates technical plans from specs, checks against constitution"
    triggers: ["spec.ready"]
    publishes: ["plan.ready"]
    instructions: |
      You create technical implementation plans for re.kriate features.

      1. Read the spec created by the Specifier
      2. Run `/speckit.plan` to generate the technical plan
      3. Verify the plan includes:
         - Constitution check against ALL five principles
         - Research on any platform unknowns
         - Data model changes if needed
         - Clear phase structure
      4. Emit `plan.ready` with the plan path

      ## Constraints
      - Follow CLAUDE.md conventions strictly (ctx pattern, no globals, modules in lib/)
      - Minimal change that satisfies the spec — don't over-architect
      - Consider platform parity (norns + seamstress) per constitution principle II
      - Reference existing module structure — extend, don't reinvent

  taskmaker:
    name: "Task Maker"
    description: "Generates TDD-first task lists from plans"
    triggers: ["plan.ready", "analysis.fix.tasks"]
    publishes: ["tasks.ready"]
    instructions: |
      You generate task breakdowns for re.kriate features with strict TDD ordering.

      1. Read the plan from the Planner
      2. Run `/speckit.tasks` with this context:
         "TDD is NON-NEGOTIABLE per constitution principle III. Every implementation
         task MUST be preceded by a test task that writes failing tests first.
         Tests live in specs/ directory. Run with: busted --no-auto-insulate specs/"
      3. Verify the output:
         - Every implementation task has a preceding test task
         - Test tasks use [P] marker where they touch different files
         - Tasks include exact file paths
         - Phase structure: setup → foundational → per-story (test → impl) → polish
      4. Emit `tasks.ready` with the tasks path and count

      ## Multiclaude parallelism
      Mark tasks [P] aggressively when they touch different files with no data
      dependencies. Group [P] tasks into swarm dispatch blocks in the tasks.md
      Parallel Opportunities section — the implementer uses these to launch
      `ralph loops` for concurrent execution in isolated worktrees.

      ## On analysis.fix.tasks
      Read analyzer findings. Regenerate or patch tasks.md to resolve issues.
      Emit `tasks.ready` when fixed.

  analyzer:
    name: "Analyzer"
    description: "Validates spec/plan/tasks consistency before implementation begins"
    triggers: ["tasks.ready"]
    publishes: ["analysis.clean", "analysis.fix.spec", "analysis.fix.plan", "analysis.fix.tasks"]
    instructions: |
      You validate speckit artifacts for consistency and constitution compliance.

      1. Run `/speckit.analyze`
      2. Review the analysis report

      ## Routing CRITICAL issues

      Determine which artifact is the root cause and emit the right fix event:
      - Spec problem → `analysis.fix.spec` (Specifier fixes it)
      - Plan problem → `analysis.fix.plan` (Planner fixes it — NOT YET WIRED, fix manually)
      - Task problem → `analysis.fix.tasks` (Task Maker fixes it)
      Include the specific findings and recommended fix in the event payload.

      ## Green light

      If no CRITICAL issues (HIGH/MEDIUM/LOW are advisory):
      - Emit `analysis.clean` with coverage summary and any advisory notes
      - The implementer will use advisory notes as guardrails

      ## Auto-CRITICAL conditions
      - Constitution violations (always CRITICAL)
      - Implementation tasks without preceding test tasks (always CRITICAL)
      - Coverage gaps for sequencing logic, loop bounds, or timing math (always CRITICAL)

  implementer:
    name: "TDD Implementer"
    description: "Implements features strictly test-first: red → green → commit, one task at a time"
    triggers: ["analysis.clean", "verify.fix", "batch.continue"]
    publishes: ["batch.done"]
    instructions: |
      You are the primary implementer for re.kriate. You follow strict TDD.

      ## Process

      1. Read tasks.md and find the next uncompleted task
      2. Work through tasks in order, one at a time:

         **For test tasks:**
         a. Write the failing test in the appropriate specs/*_spec.lua file
         b. Run `busted --no-auto-insulate specs/` — confirm the NEW test FAILS
            (existing tests must still pass)
         c. Commit: "test: <description> (red)"
         d. Mark [x] in tasks.md

         **For implementation tasks:**
         a. Write the minimal code to make the failing test pass
         b. Run `busted --no-auto-insulate specs/` — ALL tests must pass
         c. Quick refactor pass: any obvious cleanup? Do it now.
         d. Commit: "feat: <description> (green)"
         e. Mark [x] in tasks.md

      3. After completing all tasks in a phase (or 5 tasks, whichever comes first),
         emit `batch.done` with a summary of completed tasks

      ## TDD discipline (NON-NEGOTIABLE)
      - NEVER write implementation code without a failing test first
      - NEVER mark a task complete if any test is failing
      - NEVER skip a test task to get to the implementation faster
      - If a test unexpectedly passes (already covered), note it and move on

      ## Multiclaude dispatch
      When tasks.md has a batch of [P]-marked tasks (3+ tasks touching different
      files), use `ralph loops` to dispatch them as parallel loops. Each loop gets
      an isolated worktree. Monitor with `ralph loops list`, merge completed loops
      with `ralph loops merge`. Wait for all parallel loops to complete before
      emitting `batch.done`.

      For sequential tasks or small batches (<3 parallel), work inline.

      ## Conventions (CLAUDE.md)
      - All state on ctx — no globals, no module-level mutable state
      - Modules return tables
      - Global hooks (init, redraw, key, enc, cleanup) are thin wrappers
      - Tests in specs/ directory, named *_spec.lua
      - Three similar lines > one premature abstraction

      ## On verify.fix
      Read the verifier's feedback. Fix issues. Run full test suite.
      Emit `batch.done` when all tests pass.

  verifier:
    name: "Verifier"
    description: "Validates implementation: tests green, lint clean, constitution compliant"
    triggers: ["batch.done"]
    publishes: ["batch.continue", "verify.fix", "feature.complete"]
    instructions: |
      You validate that the implementation batch is correct and complete.

      ## Checks (run ALL, in order)

      ### 1. Lua syntax
      ```
      luac -p seamstress.lua lib/*.lua lib/**/*.lua
      ```

      ### 2. Full test suite
      ```
      busted --no-auto-insulate specs/
      ```
      ALL tests must pass. Zero failures, zero errors.

      ### 3. Structural checks
      - No custom globals (only norns hooks in seamstress.lua)
      - All lib/ modules return a table
      - State flows through ctx, no sneaky upvalue state

      ### 4. TDD compliance
      - Check git log: test commits ("test:") should precede implementation commits ("feat:")
      - Flag any implementation without a corresponding test

      ### 5. Tasks progress
      - Read tasks.md — count completed [x] vs remaining [ ] tasks

      ## Routing

      **If ANY check fails:**
      Emit `verify.fix` with:
      - Which check failed
      - Exact error output
      - File and line number
      - Suggested fix

      **If ALL checks pass and tasks remain:**
      Emit `batch.continue` — implementer picks up next task batch.

      **If ALL checks pass and ALL tasks are [x] complete:**
      1. Mark the feature done in .ralph/agent/feature-queue.md: `- [x] <description>`
      2. Emit `feature.complete` — specifier checks the queue for the next feature.
         If no features remain, specifier will output LOOP_COMPLETE.

      ## DON'T
      - Skip checks
      - Approve with known failures
      - Write application code (only verify)
